name: Sync WC2026 Results

on:
  schedule:
    # Every 30 min from 12pm to 2am Miami ET (EDT = UTC-4)
    # 12pm ET = 16:00 UTC  /  2am ET = 06:00 UTC
    - cron: '0,30 16,17,18,19,20,21,22,23,0,1,2,3,4,5,6 * * *'
  workflow_dispatch: # manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        env:
          FD_API_KEY: ${{ secrets.FD_API_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: node .github/workflows/sync-results.js
